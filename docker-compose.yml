services:
  db:
    image: postgres:18-alpine3.22
    container_name: scrolis_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: myapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  mongo:
    image: mongo:8
    container_name: scrolis_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: scrolis
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d

  mongo-express:
    image: mongo-express:latest
    container_name: scrolis_mongo_ui
    restart: always
    depends_on:
      - mongo
    ports:
      - "8082:8081"
    environment:
      ## basicAuth credentials are "admin:pass", it is recommended you change this in your config.js!
      ME_CONFIG_MONGODB_URL: mongodb://root:password123@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123 
      ME_CONFIG_MONGODB_SERVER: mongo

volumes:
  postgres_data:
  mongo_data: